name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build static files
      run: |
        mkdir -p dist
        cp -r static/* dist/
        cp -r templates dist/
        cp index.html dist/ 2>/dev/null || echo "No index.html found"
        cp *.html dist/ 2>/dev/null || echo "No HTML files found"
    
    - name: Create simple index page
      run: |
        cat > dist/index.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Water Management System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#features">Features</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#screenshots">Screenshots</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#installation">Installation</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="jumbotron bg-light p-5 rounded">
                    <h1 class="display-4">Water Management System</h1>
                    <p class="lead">A comprehensive water management system built with Flask, PostgreSQL, HTML, CSS, and JavaScript for monitoring water usage, quality, and analytics.</p>
                    <hr class="my-4">
                    <p>This system provides real-time monitoring of water consumption, quality testing, and analytics for efficient water resource management.</p>
                    <a class="btn btn-primary btn-lg" href="#features" role="button">Learn more</a>
                </div>
            </div>
        </div>

        <section id="features" class="mt-5">
            <h2>Features</h2>
            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title">Water Usage Tracking</h5>
                            <p class="card-text">Record and monitor water consumption from different sources with detailed analytics.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title">Water Quality Monitoring</h5>
                            <p class="card-text">Track water quality parameters and generate alerts for poor water conditions.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title">Analytics Dashboard</h5>
                            <p class="card-text">Visual analytics for usage trends and quality metrics with interactive charts.</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="screenshots" class="mt-5">
            <h2>Project Screenshots</h2>
            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card">
                        <img src="photo/Screenshot%202026-04-19%20at%2012.06.45%E2%80%AFAM.png" class="card-img-top" alt="Dashboard">
                        <div class="card-body">
                            <h6 class="card-title">Dashboard Overview</h6>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card">
                        <img src="photo/Screenshot%202026-04-19%20at%2012.29.55%E2%80%AFAM.png" class="card-img-top" alt="User Interface">
                        <div class="card-body">
                            <h6 class="card-title">User Interface</h6>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card">
                        <img src="photo/Screenshot%202026-04-19%20at%2012.30.10%E2%80%AFAM.png" class="card-img-top" alt="Water Quality">
                        <div class="card-body">
                            <h6 class="card-title">Water Quality Monitoring</h6>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="installation" class="mt-5">
            <h2>Installation</h2>
            <div class="card">
                <div class="card-body">
                    <h5>Prerequisites</h5>
                    <ul>
                        <li>Python 3.7+</li>
                        <li>PostgreSQL 12+</li>
                        <li>pip package manager</li>
                    </ul>
                    
                    <h5>Setup Instructions</h5>
                    <ol>
                        <li>Clone the repository</li>
                        <li>Create and activate virtual environment</li>
                        <li>Install dependencies</li>
                        <li>Set up PostgreSQL database</li>
                        <li>Configure environment variables</li>
                        <li>Initialize the database</li>
                        <li>Run the application</li>
                    </ol>
                    
                    <p class="mt-3">
                        <a href="https://github.com/raaaj-13/water-management-system" class="btn btn-outline-primary">
                            View on GitHub
                        </a>
                    </p>
                </div>
            </div>
        </section>
    </div>

    <footer class="bg-light mt-5 py-4">
        <div class="container text-center">
            <p>&copy; 2026 Water Management System. Built with Flask, Bootstrap, and JavaScript.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
EOF
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
